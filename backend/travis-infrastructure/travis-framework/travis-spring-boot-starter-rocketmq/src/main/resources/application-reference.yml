#配置项参考（rocketmq-v5-client-spring-boot-starter 2.3.x）
rocketmq:
  # Push 消费者配置（基于 @RocketMQMessageListener 注解驱动）
  push-consumer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_CONSUMER_ACCESS_KEY}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_CONSUMER_SECRET_KEY}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: false
    # Proxy 模式访问（gRPC 协议），默认端口为 8081
    endpoints: 127.0.0.1:8081

  # 生产者配置
  producer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_PRODUCER_ACCESS_KEY}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_PRODUCER_SECRET_KEY}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: false
    # Proxy 模式访问（gRPC 协议），默认端口为 8081
    endpoints: 127.0.0.1:8081
    # 生产者组名: 用于标识一组生产者
    group: ${spring.application.name}
    # 发送消息超时时间(毫秒)
    send-message-timeout: 3000

# travis 自定义配置
travis:
  rocketmq:
    # RocketMQ 客户端日志路径（v5 gRPC 客户端 + tools），写入 rocketmq-client.log / tools.log / tools_default.log
    # 可通过环境变量 ROCKETMQ_LOG_ROOT 覆盖此配置
    client:
      log-path: ${user.home}/data/logs/rocketmq
    auto-initialize:
      # 启动时自动初始化不存在的 Topic 和消费者分组（通过 DefaultMQAdminExt 连接 NameServer 创建）
      # 默认 false，需显式开启
      enabled: false
      # NameServer 地址（注意：不是 Proxy gRPC 端口 8081，而是 NameServer 端口 9876）
      # 启用 auto-initialize 时必填
      namesrv-addr: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}