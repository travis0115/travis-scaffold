logging:
  access:
    enabled: true #是否启用access日志，true/false，默认开启
  level:
    root: INFO  #全局日志级别
    com.travis: DEBUG #业务代码
  pattern:
    #该配置仅控制dev环境终端输出格式，生产输出为json
    console: >
      %clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint}
      %clr(%level)
      %clr(%replace(%X{request_id}){'^(.+)$',' [$1]'}){yellow}
      %clr([%thread]){magenta}
      %clr(%logger{36}:%line){cyan}
      - %msg%n%wEx

# Actuator 监控端点的配置项
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 通过 HTTP 暴露所有 Actuator 端点（默认只开放 health 和 info）,生产环境不建议全部开放，建议按需开启
  otlp:
    metrics:
      export:
        enabled: false  # 是否启用 OTLP（OpenTelemetry Protocol）指标导出

# RocketMQ配置
rocketmq:
  # 消费者配置(全局默认配置)
  push-consumer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_CONSUMER_ACCESS_KEY:}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_CONSUMER_SECRET_KEY:}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: false
    # Proxy 模式访问，端口为 Docker 映射的 8081
    endpoints: ${ROCKETMQ_CONSUMER_ENDPOINTS:127.0.0.1:8081}
  # 生产者配置
  producer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_PRODUCER_ACCESS_KEY:}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_PRODUCER_SECRET_KEY:}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: false
    # Proxy 模式访问，端口为 Docker 映射的 8081
    endpoints: ${ROCKETMQ_PRODUCER_ENDPOINTS:127.0.0.1:8081}

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/travis_monolith?serverTimezone=${travis.web.time-zone:UTC}&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  modulith:
    runtime:
      verification-enabled: true  #是否启用运行时验证，true/false

travis:
  rocketmq:
    # RocketMQ 客户端日志路径（v5 gRPC 客户端 + tools），受 rocketmq.log.root 系统属性控制
    client:
      log-path: ${user.home}/data/logs/rocketmq
    auto-initialize:
      enabled: true  # 启动时自动初始化不存在的 Topic 和消费者分组
      namesrv-addr: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}  # NameServer 地址（注意：不是 Proxy gRPC 端口），启用 auto-initialize 时必填
  web:
    domain: http://127.0.0.1