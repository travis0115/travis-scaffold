logging:
  access:
    enabled: true #是否启用access日志，true/false，默认开启
  level:
    root: info  #全局日志级别
  output: file  #日志输出方式 file/stdout
  file:
#    path: /data/logs/${spring.application.name}/${HOSTNAME:local}
    path: ${user.home}/data/logs/${spring.application.name}
    name: application #不加.log后缀
    async:
      discarding-threshold: 0 #队列丢弃日志的阈值，使用率超过阈值，开始丢低优先级日志，WARN/ERROR不丢弃，设置为0表示队列满开始丢弃
      queue-size: 1024 #队列深度，该值会影响性能
      never-block: false #永不堵塞，开启时配合discarding-threshold值，达到阈值时丢弃日志，关闭则不丢弃日志，可能导致业务阻塞
  logback:
    rollingpolicy:
      max-history: 30 #日志文件的保留天数
      max-file-size: 10MB  #日志文件，到达多少容量，进行滚动
      total-size-cap: 5GB #日志文件的总大小上限，超出会自动删除旧文件
      clean-history-on-start: true  #启动时清理

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith,metrics,prometheus  # 通过 HTTP 暴露所有 Actuator 端点（默认只开放 health 和 info）,生产环境不建议全部开放，建议按需开启
  otlp:
    metrics:
      export:
        enabled: false  # 是否启用 OTLP（OpenTelemetry Protocol）指标导出

rocketmq:
  # 消费者配置(全局默认配置)
  consumer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_CONSUMER_ACCESS_KEY}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_CONSUMER_SECRET_KEY}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: true
    # Proxy 模式访问，端口为 Docker 映射的 8081
    endpoints: 127.0.0.1:8081

  # 生产者配置
  producer:
    # 访问密钥(如果启用ACL)
    access-key: ${ROCKETMQ_PRODUCER_ACCESS_KEY}
    # 密钥(如果启用ACL)
    secret-key: ${ROCKETMQ_PRODUCER_SECRET_KEY}
    # 是否启用消息轨迹，本地开发可以关闭消息轨迹
    enable-msg-trace: true
    # Proxy 模式访问，端口为 Docker 映射的 8081
    endpoints: 127.0.0.1:8081

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/travis_monolith?serverTimezone=${travis.web.time-zone:UTC}&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  modulith:
    runtime:
      verification-enabled: false #是否启用运行时验证，true/false
travis:
  web:
    domain: http://127.0.0.1